name: Build CV PDF

# Regenerate docs/zadykian-cv.pdf from index.html whenever the page (or the
# rendering setup) changes on main, and commit the refreshed PDF back.
on:
  push:
    branches: [main]
    paths:
      - index.html
      - scripts/build-pdf.mjs
      - package.json
      - .github/workflows/build-pdf.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pdf
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Render index.html to PDF
        run: npm run build:pdf

      - name: Commit regenerated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/zadykian-cv.pdf
          if git diff --staged --quiet; then
            echo "PDF unchanged; nothing to commit."
          else
            git commit -m "chore: regenerate CV PDF from index.html [skip ci]"
            git push
          fi
